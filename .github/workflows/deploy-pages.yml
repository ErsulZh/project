name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build for GitHub Pages
        run: npm run build:pages
        working-directory: frontend

      - name: Copy site to repository root
        run: |
          cp frontend/dist/index.html ./index.html
          cp frontend/dist/index.html ./404.html
          cp frontend/dist/favicon.svg ./favicon.svg
          rm -rf ./assets
          cp -r frontend/dist/assets ./assets
          touch .nojekyll

      - name: Commit built site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html favicon.svg assets .nojekyll
          git diff --staged --quiet || git commit -m "Deploy static site to repository root"
          git push

      - uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
